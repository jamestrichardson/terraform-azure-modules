# Pre-commit hooks configuration
# See https://pre-commit.com for more information
# See https://github.com/antonbabenko/pre-commit-terraform for terraform-specific hooks

repos:
  # Standard pre-commit hooks for file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # Terraform-specific hooks
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.1
    hooks:
      # Format all Terraform files
      - id: terraform_fmt
        args:
          - --args=-recursive

      # Validate Terraform configurations
      - id: terraform_validate
        args:
          - --init-args=-backend=false

      # Generate and update module documentation via terraform-docs
      - id: terraform_docs
        args:
          - --hook-config=--path-to-file=README.md
          - --hook-config=--add-to-existing-file=true
          - --hook-config=--create-file-if-not-exist=true

      # Lint Terraform files with tflint
      - id: terraform_tflint
        args:
          - --args=--only=terraform_required_version
          - --args=--only=terraform_required_providers
          - --args=--only=terraform_naming_convention
          - --args=--only=terraform_unused_declarations
          - --args=--only=terraform_typed_variables

      # Security scanning with Trivy
      - id: terraform_trivy
        args:
          - --args=--skip-dirs="**/.terraform"

      # Ensure provider lock files are up-to-date
      - id: terraform_providers_lock
        args:
          - --args=-platform=linux_amd64
          - --args=-platform=darwin_amd64
          - --args=-platform=darwin_arm64
          - --args=-platform=windows_amd64
